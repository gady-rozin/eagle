<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sensor Change Detection</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@1.4.0"></script>

  <style>
    body { font-family: Arial; margin: 20px; }
    canvas { max-width: 100%; }
    .controls {
        display: flex;
        flex-wrap: wrap;
        gap: 16px;
        align-items: flex-end;
        background: #f8f9fb;
        padding: 16px;
        border-radius: 12px;
        box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        margin: 20px 0;
    }

    .control-group {
        display: flex;
        flex-direction: column;
        font-size: 14px;
    }

    .control-group label {
        margin-bottom: 6px;
        color: #555;
        font-weight: 500;
    }

    .control-group input,
    .control-group select {
        padding: 6px 10px;
        border-radius: 8px;
        border: 1px solid #ccc;
        min-width: 90px;
        transition: all 0.2s ease;
    }

    .control-group input:focus,
    .control-group select:focus {
        outline: none;
        border-color: #4a90e2;
        box-shadow: 0 0 4px rgba(74,144,226,0.3);
    }

    .button-group {
        margin-left: auto;
    }

    button#runBtn {
        background: #4a90e2;
        color: white;
        border: none;
        padding: 10px 18px;
        border-radius: 10px;
        cursor: pointer;
        font-weight: 600;
        transition: all 0.2s ease;
    }

    button#runBtn:hover {
        background: #357abd;
    }

    button#runBtn:active {
        transform: scale(0.97);
    }
  </style>
</head>

<body>

<h2>Sensor Change Detection</h2>

<input type="file" id="fileInput" />

<div class="controls">

  <div class="control-group">
    <label for="algo">Algorithm</label>
    <select id="algo">
      <option value="rbf" selected>RBF</option>
      <option value="l2">L2</option>
    </select>
  </div>

  <div class="control-group">
    <label for="window">Window</label>
    <input type="number" id="window" value="8" />
  </div>

  <div class="control-group">
    <label for="penalty">Penalty</label>
    <input type="number" id="penalty" value="10" />
  </div>

  <div class="control-group">
    <label for="smooth">Smooth</label>
    <input type="number" id="smooth" value="25" />
  </div>

  <div class="control-group button-group">
    <button id="runBtn">Run Detection</button>
  </div>

</div>

<p id="status">Idle</p>

<canvas id="chart"></canvas>

<script src="app.js"></script>

</body>
</html>
